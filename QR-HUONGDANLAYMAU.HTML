<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hướng Dẫn Lấy Mẫu Xét Nghiệm</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* PHONG CÁCH CARTOONISH - PASTEL TƯƠI SÁNG */
        :root {
            --bg-color: #e0f7fa; /* Xanh pastel làm dịu tâm lý */
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-btn: #4ecdc4; /* Xanh mint */
            --secondary-btn: #ff9f43; /* Cam vui nhộn */
            --accent: #ff6b6b; /* Đỏ san hô */
            --font-size-base: 18px;
            --border-radius: 25px;
        }

        /* CHẾ ĐỘ NGƯỜI CAO TUỔI (HIGH CONTRAST & BIG TEXT) */
        body.elderly-mode {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --primary-btn: #ffff00; /* Vàng rực */
            --secondary-btn: #00ff00; /* Xanh lá rực */
            --accent: #ff00ff;
            --font-size-base: 26px; /* Chữ to gấp rưỡi */
        }

        body.elderly-mode .tab-btn { color: #000; }
        body.elderly-mode .instruction-box { background-color: #333; color: #fff; border-left: 8px solid var(--accent); }

        body {
            font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: var(--font-size-base);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        /* HEADER & TRỢ LÝ ẢO 3D */
        header {
            width: 100%;
            background: var(--primary-btn);
            padding: 15px 0 0 0;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        body.elderly-mode header { background: #333; border-bottom: 5px solid var(--primary-btn); }

        h1 {
            color: #fff;
            margin: 0 0 10px 0;
            font-size: 1.8em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        #mascot-container {
            width: 100%;
            height: 200px;
            margin: 0 auto;
        }

        /* NÚT TRỢ GIÚP NGƯỜI CAO TUỔI (NỔI BẬT GÓC TRÊN) */
        .btn-accessibility {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: var(--secondary-btn);
            color: white;
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 10;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* TABS MENU */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 20px 10px;
            max-width: 800px;
        }

        .tab-btn {
            background-color: var(--card-bg);
            border: 3px solid var(--primary-btn);
            border-radius: var(--border-radius);
            padding: 12px 20px;
            font-size: 1em;
            font-weight: bold;
            color: var(--primary-btn);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .tab-btn.active, .tab-btn:active {
            background-color: var(--primary-btn);
            color: white !important;
            transform: translateY(-2px);
        }

        /* KHU VỰC NỘI DUNG */
        .content-area {
            background-color: var(--card-bg);
            max-width: 700px;
            width: 90%;
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            animation: slideUp 0.4s ease-out;
        }

        .instruction-box {
            background-color: #f8f9fa;
            border-left: 6px solid var(--accent);
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 15px;
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
            line-height: 1.6;
        }

        .instruction-box strong { color: var(--accent); font-size: 1.2em; }
        body.elderly-mode .instruction-box strong { color: var(--primary-btn); }

        /* NÚT ĐỌC THÀNH TIẾNG */
        .btn-speak {
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 8px rgba(255, 107, 107, 0.4);
        }

        .btn-speak.playing { background-color: var(--secondary-btn); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .citation { display: none; } /* Ẩn trích dẫn để giao diện thân thiện, nhưng giữ trong code */
    </style>
</head>
<body>

    <header>
        <h1>Trợ Lý Lấy Mẫu</h1>
        <button class="btn-accessibility" onclick="toggleElderlyMode()" title="Chế độ chữ to cho người lớn tuổi">🔍</button>
        <div id="mascot-container"></div>
    </header>

    <div class="tabs" id="tabs-container"></div>
    <div class="content-area" id="content-display"></div>

    <script>
        // ==========================================
        // 1. DỮ LIỆU NỘI DUNG (Dựa trên tài liệu gốc)
        // ==========================================
        const appData = {
            "nuoc-tieu": {
                id: "nuoc-tieu", title: "Nước Tiểu (Thường)", icon: "💧",
                textToRead: "Hướng dẫn lấy mẫu nước tiểu thông thường. Bước 1: Rửa sạch bộ phận sinh dục bằng nước sạch. Bước 2: Lấy nước tiểu giữa dòng, bỏ phần nước tiểu đầu, tiểu vào lọ do nhân viên y tế cung cấp. Sau đó, gửi ngay đến phòng lấy mẫu và để ống mẫu trên giá.",
                sections: [
                    { subtitle: "Chuẩn bị", content: "Sử dụng ống (tube) trắng 7ml có nắp[cite: 35]. Rửa sạch bộ phận sinh dục bằng nước sạch[cite: 37]." },
                    { subtitle: "Cách lấy mẫu", content: "Lấy nước tiểu giữa dòng[cite: 38]. Đi tiểu bỏ phần nước tiểu đầu tiên, sau đó tiểu vào lọ đựng do nhân viên y tế cung cấp[cite: 38]." },
                    { subtitle: "Nộp mẫu", content: "Gửi ngay đến phòng lấy mẫu xét nghiệm ban đầu[cite: 39]. Để ngay ống mẫu trên giá đựng theo hướng dẫn của nhân viên[cite: 39]." }
                ]
            },
            "nuoc-tieu-24h": {
                id: "nuoc-tieu-24h", title: "Nước Tiểu 24H", icon: "⏳",
                textToRead: "Hướng dẫn lấy mẫu nước tiểu 24 giờ. Bước 1: 6 giờ sáng tiểu hết bỏ đi. Bước 2: Những lần đi tiểu tiếp theo hứng cả vào bình. Đến 6 giờ sáng ngày hôm sau đi tiểu lần cuối cùng vào bình. Mỗi lần cho nước tiểu vào phải lắc đều. Mang đến phòng xét nghiệm trong vòng 2 tiếng.",
                sections: [
                    { subtitle: "Dụng cụ", content: "Bình nhựa có nắp và chứa chất bảo quản nước tiểu do Khoa Xét nghiệm cung cấp[cite: 21, 22]." },
                    { subtitle: "Ngày thứ nhất", content: "Đúng 6 giờ sáng, đi tiểu hết bỏ đi[cite: 24]. Những lần đi tiểu tiếp theo trong ngày (kể cả khi đi tắm, đi đại tiện) hứng TẤT CẢ vào bình[cite: 25]." },
                    { subtitle: "Ngày thứ hai", content: "Đến đúng 6 giờ sáng hôm sau, đi tiểu lần cuối cùng vào bình[cite: 26]. Để bình ở chỗ mát, đậy kín nắp[cite: 27]. Nhớ lắc đều bình mỗi lần thêm nước tiểu để trộn với chất bảo quản[cite: 28]." },
                    { subtitle: "Nộp mẫu", content: "Gửi ngay đến phòng lấy mẫu xét nghiệm[cite: 29]. Thời gian không được quá 2 tiếng kể từ khi lấy xong mẫu cuối cùng[cite: 30]." }
                ]
            },
            "phan": {
                id: "phan", title: "Xét Nghiệm Phân", icon: "💩",
                textToRead: "Hướng dẫn lấy mẫu phân. Bước 1: Chuẩn bị bô sạch, tráng nước sôi để nguội, không dùng chất sát khuẩn. Bước 2: Dùng que lấy khoảng 5 gram phân cỡ đầu ngón tay út ở chỗ có nhày, máu. Gửi ngay đến phòng xét nghiệm không quá 30 phút.",
                sections: [
                    { subtitle: "Chuẩn bị", content: "Lọ nhựa vô khuẩn có nắp xoáy, có que gỗ để lấy phân[cite: 4]. Chuẩn bị bô không có chất sát khuẩn, tráng bằng nước sôi để nguội[cite: 5, 6]." },
                    { subtitle: "Cách lấy mẫu", content: "Lấy khoảng 5 Gram phân (bằng đầu ngón tay út)[cite: 7]. Chọn lấy ở những vị trí phân có nhày, máu, hoặc lợn cợn trắng[cite: 7]." },
                    { subtitle: "Nộp mẫu", content: "Gửi ngay đến phòng lấy mẫu ban đầu[cite: 8]. Thời gian mang đến không quá 30 phút sau khi lấy[cite: 8]." }
                ]
            },
            "dam": {
                id: "dam", title: "Xét Nghiệm Đàm", icon: "🗣️",
                textToRead: "Hướng dẫn lấy mẫu đàm. Súc miệng bằng nước muối sinh lý vô khuẩn. Ngồi thẳng lưng, hít sâu, nín hơi vài lần rồi ho mạnh khạc ra lọ. Mỗi lần khạc 1 lọ, lấy đủ 2 lọ. Mang đến phòng xét nghiệm không quá 30 phút.",
                sections: [
                    { subtitle: "Thời điểm & Dụng cụ", content: "Thời điểm lấy mẫu tốt nhất là sáng sớm khi mới thức dậy[cite: 13]. Dùng 2 lọ nhựa vô khuẩn có nắp xoáy do y tế cấp[cite: 12]." },
                    { subtitle: "Cách lấy đàm", content: "Súc miệng bằng nước muối sinh lý vô khuẩn (không dùng chất sát khuẩn)[cite: 14]. Ngồi thẳng lưng, hít thật sâu nín hơi vài lần rồi ho mạnh khạc ra[cite: 15]. Mỗi lần khạc vào 1 lọ, lấy đủ 2 lọ[cite: 16]." },
                    { subtitle: "Nộp mẫu", content: "Gửi ngay đến phòng lấy mẫu xét nghiệm[cite: 17]. Không quá 30 phút sau khi lấy[cite: 17]." }
                ]
            }
        };

        // ==========================================
        // 2. LOGIC TƯƠNG TÁC GIAO DIỆN & TTS
        // ==========================================
        let isSpeaking = false;
        let isElderlyMode = false;
        let currentUtterance = null;

        function toggleElderlyMode() {
            isElderlyMode = !isElderlyMode;
            if(isElderlyMode) {
                document.body.classList.add('elderly-mode');
            } else {
                document.body.classList.remove('elderly-mode');
            }
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('tabs-container');
            Object.values(appData).forEach((tabData, index) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (index === 0 ? ' active' : '');
                btn.innerHTML = `${tabData.icon} ${tabData.title}`;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    window.speechSynthesis.cancel(); // Dừng đọc khi đổi tab
                    isSpeaking = false;
                    renderContent(tabData.id);
                };
                tabsContainer.appendChild(btn);
            });
            renderContent(Object.values(appData)[0].id);
        }

        function renderContent(tabId) {
            const data = appData[tabId];
            const display = document.getElementById('content-display');
            
            let htmlStr = ``;
            data.sections.forEach(sec => {
                htmlStr += `<div class="instruction-box"><strong>${sec.subtitle}</strong><br>${sec.content}</div>`;
            });
            
            htmlStr += `<button class="btn-speak" id="speak-btn" onclick="toggleSpeech('${tabId}')">
                🔊 Bấm để nghe hướng dẫn
            </button>`;

            display.innerHTML = htmlStr;
        }

        function toggleSpeech(tabId) {
            const btn = document.getElementById('speak-btn');
            if (isSpeaking) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
                btn.innerHTML = '🔊 Bấm để nghe hướng dẫn';
                btn.classList.remove('playing');
                return;
            }

            const text = appData[tabId].textToRead;
            currentUtterance = new SpeechSynthesisUtterance(text);
            currentUtterance.lang = 'vi-VN';
            currentUtterance.rate = isElderlyMode ? 0.8 : 1.0; // Đọc chậm hơn nếu là người già

            currentUtterance.onstart = () => {
                isSpeaking = true;
                btn.innerHTML = '⏸️ Đang đọc (Bấm để dừng)';
                btn.classList.add('playing');
            };
            currentUtterance.onend = () => {
                isSpeaking = false;
                btn.innerHTML = '🔊 Bấm để nghe hướng dẫn';
                btn.classList.remove('playing');
            };

            window.speechSynthesis.speak(currentUtterance);
        }

        renderTabs();

        // ==========================================
        // 3. TRỢ LÝ ẢO 3D (THREE.JS MASCOT)
        // Nhân vật bé Robot Capsule sinh động
        // ==========================================
        function initMascot() {
            const container = document.getElementById('mascot-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            // Tạo Mascot: Nhóm (Group) để chứa thân và mắt
            const mascot = new THREE.Group();

            // Thân Robot (Capsule) màu trắng y tế
            const bodyGeo = new THREE.CapsuleGeometry(1, 1.2, 4, 16);
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 100 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            mascot.add(body);

            // Kính râm / Màn hình mặt (Màu đen)
            const visorGeo = new THREE.CapsuleGeometry(0.6, 0.4, 4, 16);
            const visorMat = new THREE.MeshPhongMaterial({ color: 0x222222, shininess: 150 });
            const visor = new THREE.Mesh(visorGeo, visorMat);
            visor.position.set(0, 0.5, 0.8);
            visor.rotation.z = Math.PI / 2;
            mascot.add(visor);

            // Mắt trái (Xanh dương chớp nháy)
            const eyeGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x4ecdc4 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.3, 0.5, 1.3);
            mascot.add(eyeL);

            // Mắt phải
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.3, 0.5, 1.3);
            mascot.add(eyeR);

            scene.add(mascot);

            // Ánh sáng
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);

            camera.position.z = 6;
            camera.position.y = 1;

            let clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                let time = clock.getElapsedTime();

                // Chuyển động lơ lửng nhịp nhàng (Idle animation)
                mascot.position.y = Math.sin(time * 2) * 0.2;
                mascot.rotation.y = Math.sin(time * 0.5) * 0.2;

                // Nếu đang đọc thành tiếng, Mascot nhún nhảy và "nháy mắt" nhanh hơn
                if (isSpeaking) {
                    mascot.scale.y = 1 + Math.sin(time * 15) * 0.05; // Cảm giác đang nói
                    eyeMat.color.setHex(time % 0.5 < 0.25 ? 0xff9f43 : 0x4ecdc4); // Mắt đổi màu vui nhộn
                } else {
                    mascot.scale.y = 1; // Trở lại bình thường
                    eyeMat.color.setHex(0x4ecdc4);
                }

                renderer.render(scene, camera);
            }
            animate();

            // Xử lý khi xoay dọc ngang điện thoại
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }

        initMascot();
    </script>
</body>
</html>
