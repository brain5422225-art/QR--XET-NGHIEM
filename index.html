<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hướng dẫn xét nghiệm</title>

<style>
body { margin:0; font-family:Segoe UI; background:#f5fbff;}
header {
  background:linear-gradient(90deg,#0077b6,#00b4d8);
  color:white; text-align:center; padding:15px;
}
.tabs { display:flex; background:#caf0f8;}
.tab { flex:1; padding:10px; text-align:center; cursor:pointer;}
.tab.active { background:#0077b6; color:white;}
.content { padding:15px;}
.card {
  background:white; padding:12px; margin:10px 0;
  border-left:5px solid #00b4d8; border-radius:8px;
}
.controls { padding:10px; text-align:center;}
button {
  padding:8px 12px; margin:5px;
  border:none; border-radius:5px;
  background:#0077b6; color:white;
}
#viewer { width:100%; height:300px;}
</style>
</head>

<body>

<header>🏥 HƯỚNG DẪN XÉT NGHIỆM</header>

<div class="controls">
<button onclick="setLang('vi')">🇻🇳 Việt</button>
<button onclick="setLang('en')">🇺🇸 English</button>
<button onclick="speak()">🔊 Nghe</button>
</div>

<div class="tabs">
<div class="tab active" onclick="loadTab(0)">🩸</div>
<div class="tab" onclick="loadTab(1)">🚽</div>
<div class="tab" onclick="loadTab(2)">💩</div>
</div>

<div id="content"></div>
<div id="viewer"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/loaders/GLTFLoader.js"></script>

<script>
let lang = "vi";

const data = [
{
vi:{
title:"Xét nghiệm máu",
text:["Nhịn ăn 8-12 giờ","Được uống nước lọc","Ngủ đủ giấc"]
},
en:{
title:"Blood Test",
text:["Fast 8-12 hours","Drink water","Sleep well"]
},
model:"https://modelviewer.dev/shared-assets/models/Astronaut.glb"
},
{
vi:{
title:"Nước tiểu",
text:["Rửa sạch","Lấy giữa dòng","Dùng lọ sạch"]
},
en:{
title:"Urine Test",
text:["Clean first","Midstream sample","Use clean cup"]
},
model:"https://modelviewer.dev/shared-assets/models/RobotExpressive.glb"
},
{
vi:{
title:"Phân",
text:["Lấy lượng nhỏ","Không dính nước","Không lấy từ bồn cầu"]
},
en:{
title:"Stool Test",
text:["Small sample","No water","Not from toilet"]
},
model:"https://modelviewer.dev/shared-assets/models/Chair.glb"
}
];

let currentTab = 0;
let scene, camera, renderer, controls;

function renderContent(){
let d = data[currentTab][lang];
let html = `<h2>${d.title}</h2>`;
d.text.forEach(t=>{
html += `<div class="card">👉 ${t}</div>`;
});
document.getElementById("content").innerHTML = html;
}

function setLang(l){
lang = l;
renderContent();
}

function speak(){
let d = data[currentTab][lang];
let text = d.text.join(". ");
let speech = new SpeechSynthesisUtterance(text);
speech.lang = (lang==="vi")?"vi-VN":"en-US";
speechSynthesis.speak(speech);
}

function init3D(){
scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(75, window.innerWidth/300, 0.1, 1000);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,300);

document.getElementById("viewer").innerHTML="";
document.getElementById("viewer").appendChild(renderer.domElement);

const light = new THREE.HemisphereLight(0xffffff,0x444444);
scene.add(light);

controls = new THREE.OrbitControls(camera, renderer.domElement);
camera.position.set(0,1,3);

animate();
}

function loadModel(url){
const loader = new THREE.GLTFLoader();
loader.load(url,function(gltf){
scene.add(gltf.scene);
});
}

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}

function loadTab(i){
currentTab = i;
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.tab')[i].classList.add('active');

renderContent();
init3D();
loadModel(data[i].model);
}

loadTab(0);
</script>

</body>
</html>
