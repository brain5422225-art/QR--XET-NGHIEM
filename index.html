<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Vụ Khách Hàng - Khoa Xét Nghiệm BVĐK Cà Mau</title>
    <style>
        /* MÀU SẮC Y TẾ & TỔNG QUAN */
        :root {
            --primary-blue: #1565c0;
            --light-blue: #e3f2fd;
            --active-blue: #0d47a1;
            --text-main: #2c3e50;
            --text-red: #d32f2f;
            --card-bg: #ffffff;
            --border-color: #cfd8dc;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--light-blue);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--primary-blue);
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* MAIN TABS */
        .main-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px auto 10px;
            width: 95%;
            max-width: 1400px;
        }

        .main-tab-btn {
            padding: 15px 40px;
            font-size: 1.4rem;
            font-weight: 700;
            border: 2px solid var(--primary-blue);
            border-radius: 30px;
            background: var(--card-bg);
            color: var(--primary-blue);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .main-tab-btn.active {
            background: var(--primary-blue);
            color: white;
            box-shadow: 0 6px 12px rgba(21, 101, 192, 0.3);
        }

        /* BỐ CỤC NỘI DUNG */
        .wrapper {
            display: none;
            max-width: 1400px;
            width: 95%;
            margin: 20px auto 40px;
            gap: 30px;
            flex-grow: 1;
            align-items: stretch;
        }

        .wrapper.active {
            display: flex;
            animation: fadeIn 0.4s ease-out;
        }

        .sidebar {
            flex: 0 0 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-button {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-size: 1.2rem;
            font-weight: 600;
            color: #546e7a;
        }

        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            border-color: #90caf9;
        }

        .nav-button.active {
            background: #e3f2fd;
            border-color: var(--primary-blue);
            color: var(--active-blue);
            border-left: 6px solid var(--primary-blue);
        }

        .content-box {
            flex: 1;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* BẢNG DỮ LIỆU & TÌM KIẾM */
        .search-bar {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .search-bar:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.15rem;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            text-align: left;
            line-height: 1.5;
        }

        th {
            background-color: var(--primary-blue);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            position: sticky;
            top: 55px;
            z-index: 9;
        }

        tr:nth-child(even) { background-color: #f9fbfd; }
        tr:hover { background-color: #f1f8e9; }

        /* DANH CHO BENH NHAN - CARDS */
        .step-card {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px dashed var(--border-color);
        }
        .step-card:last-child { border: none; }
        .step-title {
            font-size: 1.5rem;
            color: var(--primary-blue);
            margin-bottom: 10px;
            font-weight: 700;
        }
        .step-content {
            font-size: 1.25rem;
            line-height: 1.8;
        }
        .highlight {
            color: var(--text-red);
            font-weight: bold;
            background: #ffebee;
            padding: 2px 8px;
            border-radius: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .wrapper { flex-direction: column; }
            .sidebar { flex-direction: row; flex-wrap: wrap; flex: none; }
            .nav-button { flex: 1 1 45%; justify-content: center; text-align: center; }
            .main-tabs { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Dịch Vụ Khách Hàng</h1>
        <div style="font-size: 1.2rem; font-weight: 600; margin-top: 8px; opacity: 0.95;">KHOA XÉT NGHIỆM - BỆNH VIỆN ĐA KHOA CÀ MAU</div>
    </header>

    <div class="main-tabs">
        <button class="main-tab-btn active" onclick="switchMainTab('patient')">👨‍👩‍👧‍👦 Dành Cho Bệnh Nhân</button>
        <button class="main-tab-btn" onclick="switchMainTab('staff')">🩺 Dành Cho Nhân Viên Y Tế</button>
    </div>

    <div class="wrapper active" id="patient-view">
        <div class="sidebar" id="patient-nav"></div>
        <div class="content-box" id="patient-content"></div>
    </div>

    <div class="wrapper" id="staff-view">
        <div class="sidebar" id="staff-nav"></div>
        <div class="content-box" id="staff-content"></div>
    </div>

                            - Khách hàng/Bác sĩ phải <span class="highlight">ghi rõ lý do, yêu cầu và ký xác nhận</span> vào phiếu chỉ định.<br>
                            - KXN tiến hành xét nghiệm và ghi chú tình trạng mẫu lên phiếu kết quả.<br>
                            - Nếu thiếu phiếu chỉ định đúng chuẩn: KXN vẫn làm XN nhưng không trả kết quả cho đến khi nhận đủ phiếu chuẩn.
                        </div>
                    </div>
                    <div class="step-card">
                        <div class="step-title">🚑 4. Mẫu Cấp cứu/Khẩn (Thiếu phiếu chuẩn)</div>
                        <div class="step-content">
                            - Nếu mẫu đạt nhưng thiếu phiếu yêu cầu chuẩn: Vẫn tiến hành làm xét nghiệm.<br>
                            - Trả kết quả qua điện thoại nếu rơi vào ngưỡng cảnh báo lâm sàng.<br>
                            - Kết quả chính thức bản giấy chỉ được trả khi nhận được phiếu chỉ định chuẩn.
                        </div>
                    </div>
                `
            }
        };

        // ================= LOGIC ĐIỀU KHIỂN =================

        // 1. Chuyển đổi Tab Lớn
        function switchMainTab(tab) {
            document.querySelectorAll('.main-tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.wrapper').forEach(w => w.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-view').classList.add('active');
        }

        // 2. Khởi tạo menu Bệnh Nhân
        function initPatientNav() {
            const nav = document.getElementById('patient-nav');
            const content = document.getElementById('patient-content');
            
            Object.keys(patientData).forEach((key, index) => {
                const item = patientData[key];
                const btn = document.createElement('button');
                btn.className = `nav-button ${index === 0 ? 'active' : ''}`;
                btn.innerHTML = `<span>📝 ${item.title.replace('Hướng dẫn lấy mẫu: ', '')}</span>`;
                
                btn.onclick = () => {
                    document.querySelectorAll('#patient-nav .nav-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    let html = `<h2 style="color:var(--primary-blue); border-bottom: 3px solid #e3f2fd; padding-bottom: 15px; margin-top:0;">${item.title}</h2>`;
                    item.sections.forEach(s => {
                        html += `<div class="step-card">
                                    <div class="step-title">${s.t}</div>
                                    <div class="step-content">${s.c}</div>
                                 </div>`;
                    });
                    content.innerHTML = html;
                };
                nav.appendChild(btn);
            });
            nav.querySelector('.nav-button').click();
        }

        // 3. Khởi tạo menu Nhân Viên Y Tế
        function initStaffNav() {
            const nav = document.getElementById('staff-nav');
            const content = document.getElementById('staff-content');
            
            Object.keys(staffData).forEach((key, index) => {
                const item = staffData[key];
                const btn = document.createElement('button');
                btn.className = `nav-button ${index === 0 ? 'active' : ''}`;
                btn.innerHTML = `<span>${item.icon} ${item.title}</span>`;
                
                btn.onclick = () => {
                    document.querySelectorAll('#staff-nav .nav-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    content.innerHTML = item.render();
                };
                nav.appendChild(btn);
            });
            nav.querySelector('.nav-button').click();
        }

        // 4. Tính năng Tìm kiếm (Search) trong bảng Xét nghiệm
        function filterTable() {
            let input = document.getElementById("search-xn");
            if(!input) return;
            let filter = input.value.toUpperCase();
            let table = document.getElementById("table-xn");
            let tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) { 
                let tdName = tr[i].getElementsByTagName("td")[0];
                let tdGroup = tr[i].getElementsByTagName("td")[1];
                if (tdName || tdGroup) {
                    let txtValue = (tdName.textContent || tdName.innerText) + " " + (tdGroup.textContent || tdGroup.innerText);
                    if (txtValue.toUpperCase().indexOf(filter) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }       
            }
        }

        // Khởi chạy App
        initPatientNav();
        initStaffNav();
    </script>
</body>
</html>
