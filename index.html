<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hướng Dẫn Lấy Mẫu Xét Nghiệm</title>
    <style>
        /* MÀU SẮC Y TẾ PASTEL & KHÔNG GIAN RỘNG MỞ */
        :root {
            --primary-blue: #1976d2;
            --active-blue: #0d47a1;
            --text-main: #2c3e50;
            --text-red: #d32f2f;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* NỀN XANH DƯƠNG PASTEL DỊU MẮT */
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            display: flex;
            flex-direction: column;
            color: var(--text-main);
        }

        header {
            width: 100%;
            padding: 25px 0;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-bottom: 4px solid #64b5f6;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--primary-blue);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1.5px;
        }

        /* BỐ CỤC FULL MÀN HÌNH - RỘNG RÃI */
        .main-wrapper {
            display: flex;
            max-width: 1400px; /* Mở rộng tối đa */
            width: 95%;
            margin: 40px auto;
            gap: 40px; /* Khoảng cách lớn giữa menu và nội dung */
            flex-grow: 1;
            align-items: stretch;
        }

        .sidebar {
            flex: 0 0 350px; /* Cột trái to hơn */
            display: flex;
            flex-direction: column;
            gap: 20px; /* Nút bấm cách xa nhau hơn */
        }

        .nav-button {
            background: var(--card-bg);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 20px 25px; /* Nút to và dễ bấm hơn */
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.3s ease-out;
            text-align: left;
            font-size: 1.3rem;
            font-weight: 700;
            color: #546e7a;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
        }

        .nav-button img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: contain;
            background-color: #f1f8e9; /* Nền xanh lá cực nhạt cho icon */
            padding: 8px;
            border: 1px solid #e0e0e0;
        }

        .nav-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: #90caf9;
        }

        .nav-button.active {
            background: #e3f2fd;
            border-color: var(--primary-blue);
            color: var(--active-blue);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        /* KHU VỰC NỘI DUNG HIỂN THỊ RÕ ĐẸP */
        .content-box {
            flex: 1;
            background: var(--card-bg);
            border-radius: 25px;
            padding: 50px; /* Khoảng không gian (padding) lớn */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            animation: fadeIn 0.4s ease-out;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Căn giữa nội dung theo chiều dọc */
        }

        .step-card {
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 2px dashed #cfd8dc;
        }

        .step-card:last-child { 
            border: none; 
            margin-bottom: 0; 
            padding-bottom: 0; 
        }

        .step-title {
            font-size: 1.6rem;
            color: var(--primary-blue);
            margin-bottom: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
        }

        .step-content {
            font-size: 1.35rem; /* Chữ to, dễ đọc cho người lớn tuổi */
            line-height: 1.8;
            color: #34495e;
        }

        .highlight {
            color: var(--text-red);
            font-weight: bold;
            background: #ffebee;
            padding: 4px 10px;
            border-radius: 6px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; padding: 10px; }
            .sidebar { flex: none; width: 100%; flex-direction: row; flex-wrap: wrap; }
            .nav-button { flex: 1 1 45%; padding: 15px; font-size: 1.1rem; justify-content: center; }
            .content-box { padding: 30px; }
            .step-content { font-size: 1.15rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Hướng Dẫn Lấy Mẫu</h1>
    </header>

    <div class="main-wrapper">
        <div class="sidebar" id="sidebar-nav"></div>
        <div class="content-box" id="main-content"></div>
    </div>

    <script>
        // CẬP NHẬT CÁC ICON CHUẨN Y TẾ
        const appData = {
            "nuoc-tieu": {
                title: "Nước Tiểu Thường",
                // Icon ống nghiệm y tế
                image: "https://cdn-icons-png.flaticon.com/512/4323/4323011.png", 
                sections: [
                    { t: "1. Chuẩn bị", c: "Sử dụng ống nhựa trắng 7ml. <span class='highlight'>Rửa sạch tay và vùng kín</span> bằng nước sạch." },
                    { t: "2. Cách lấy", c: "Bỏ đoạn nước tiểu đầu. <span class='highlight'>Hứng đoạn giữa dòng</span> vào ống nhựa. Đừng để ống chạm vào da." },
                    { t: "3. Hoàn tất", c: "Đóng nắp chặt. Đặt ống lên giá tại phòng xét nghiệm theo chỉ dẫn." }
                ]
            },
            "nuoc-tieu-24h": {
                title: "Nước Tiểu 24H",
                // Icon đồng hồ theo dõi y tế
                image: "https://cdn-icons-png.flaticon.com/512/2966/2966486.png", 
                sections: [
                    { t: "1. Bắt đầu (6 giờ sáng)", c: "<span class='highlight'>Tiểu hết bỏ đi</span>, không lấy vào bình." },
                    { t: "2. Thu thập", c: "Mọi lần đi tiểu sau đó (kể cả khi tắm, đi ngoài) <span class='highlight'>phải hứng hết vào bình</span>." },
                    { t: "3. Kết thúc", c: "6 giờ sáng hôm sau tiểu lần cuối vào bình. <span class='highlight'>Lắc đều</span> bình mỗi lần thêm nước tiểu. Để chỗ mát." }
                ]
            },
            "dam": {
                title: "Xét Nghiệm Đàm",
                // Icon hệ hô hấp / phổi y khoa
                image: "https://cdn-icons-png.flaticon.com/512/3063/3063200.png", 
                sections: [
                    { t: "1. Chuẩn bị", c: "Nên lấy vào <span class='highlight'>sáng sớm khi mới ngủ dậy</span>. Súc miệng bằng nước muối sinh lý." },
                    { t: "2. Cách lấy", c: "Hít sâu, nín thở rồi <span class='highlight'>ho thật mạnh</span> để khạc đờm từ phổi ra lọ. Lấy đủ 2 lọ." },
                    { t: "3. Lưu ý", c: "Không dùng nước súc miệng diệt khuẩn. Mang nộp trong vòng 30 phút." }
                ]
            },
            "phan": {
                title: "Xét Nghiệm Phân",
                // Icon lọ đựng mẫu bệnh phẩm xét nghiệm
                image: "https://cdn-icons-png.flaticon.com/512/1056/1056345.png", 
                sections: [
                    { t: "1. Chuẩn bị", c: "Dùng bô sạch <span class='highlight'>tráng nước sôi để nguội</span>. Không dùng hóa chất tẩy rửa bô." },
                    { t: "2. Cách lấy", c: "Dùng que múc phân cỡ <span class='highlight'>đầu ngón tay út</span>. Lấy chỗ có nhày, máu hoặc lợn cợn trắng." },
                    { t: "3. Nộp mẫu", c: "Đóng nắp kỹ. Mang đến phòng xét nghiệm <span class='highlight'>ngay trong vòng 30 phút</span>." }
                ]
            }
        };

        const nav = document.getElementById('sidebar-nav');
        const content = document.getElementById('main-content');

        function initApp() {
            Object.keys(appData).forEach((key, index) => {
                const item = appData[key];
                const btn = document.createElement('button');
                btn.className = `nav-button ${index === 0 ? 'active' : ''}`;
                btn.innerHTML = `<img src="${item.image}" alt="icon"> <span>${item.title}</span>`;
                
                btn.onclick = () => {
                    document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showContent(key);
                };
                nav.appendChild(btn);
            });
            showContent(Object.keys(appData)[0]);
        }

        function showContent(key) {
            const data = appData[key];
            
            content.style.animation = 'none';
            content.offsetHeight; 
            content.style.animation = null;

            let html = `<h2 style="color:var(--primary-blue); margin-top:0; font-size:2.2rem; border-bottom: 3px solid #e3f2fd; padding-bottom: 15px; margin-bottom: 25px;">${data.title}</h2>`;
            data.sections.forEach(s => {
                html += `
                    <div class="step-card">
                        <div class="step-title">✨ ${s.t}</div>
                        <div class="step-content">${s.c}</div>
                    </div>
                `;
            });
            content.innerHTML = html;
        }

        initApp();
    </script>
</body>
</html>
