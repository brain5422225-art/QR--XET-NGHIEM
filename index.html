<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hướng Dẫn Lấy Mẫu Xét Nghiệm</title>
    <style>
        /* THIẾT LẬP NỀN Y TẾ HIỆN ĐẠI */
        :root {
            --primary-teal: #2c7a7b;
            --active-blue: #3182ce;
            --text-main: #2d3748;
            --text-red: #e53e3e;
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* Đã thay đổi đường dẫn trỏ thẳng vào file bg.jpg trong cùng thư mục */
            background: url('./bg.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
        }

        /* TIÊU ĐỀ TRÊN CÙNG */
        header {
            width: 100%;
            padding: 25px 0;
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            color: var(--primary-teal);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }

        /* BỐ CỤC CHÍNH */
        .main-wrapper {
            display: flex;
            max-width: 1200px;
            width: 95%;
            margin: 30px auto;
            gap: 25px;
            flex-grow: 1;
        }

        /* SIDEBAR BÊN TRÁI */
        .sidebar {
            flex: 0 0 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* NÚT BẤM NỔI KHỐI 3D (NEUMORPHISM) */
        .nav-button {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-size: 1.15rem;
            font-weight: 700;
            color: #4a5568;
            box-shadow: 8px 8px 16px rgba(0,0,0,0.1), 
                       -8px -8px 16px rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
        }

        .nav-button img {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #edf2f7;
        }

        .nav-button:hover {
            transform: scale(1.02);
            color: var(--active-blue);
        }

        /* Trạng thái nút khi được chọn (Lõm xuống) */
        .nav-button.active {
            box-shadow: inset 6px 6px 12px rgba(0,0,0,0.1), 
                        inset -6px -6px 12px rgba(255,255,255,0.8);
            color: var(--active-blue);
            transform: scale(0.98);
            background: rgba(237, 242, 247, 0.95);
        }

        /* KHU VỰC HIỂN THỊ NỘI DUNG (GLASSMORPHISM) */
        .content-box {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.5s ease;
        }

        .step-card {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #cbd5e0;
        }

        .step-card:last-child { border: none; padding-bottom: 0; margin-bottom: 0; }

        .step-title {
            font-size: 1.4rem;
            color: var(--primary-teal);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .step-content {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #2d3748;
        }

        /* CHỮ NỔI BẬT PHÙ HỢP NỀN */
        .highlight {
            color: var(--text-red);
            font-weight: 800;
            background: #fff5f5;
            padding: 2px 8px;
            border-radius: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { flex: none; width: 100%; flex-direction: row; flex-wrap: wrap; }
            .nav-button { flex: 1 1 45%; justify-content: center; padding: 15px; }
            .nav-button span { font-size: 1rem; }
            .content-box { padding: 25px; }
        }
        @media (max-width: 500px) {
            .nav-button { flex: 1 1 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Hướng Dẫn Lấy Mẫu</h1>
    </header>

    <div class="main-wrapper">
        <div class="sidebar" id="sidebar-nav"></div>
        <div class="content-box" id="main-content"></div>
    </div>

    <script>
        // DỮ LIỆU NỘI DUNG ĐÃ GẮN ĐƯỜNG DẪN ẢNH TẠI THƯ MỤC LOCAL
        const appData = {
            "nuoc-tieu": {
                title: "Nước Tiểu Thường",
                image: "./urine.png", 
                sections: [
                    { t: "1. Chuẩn bị", c: "Sử dụng ống nhựa trắng 7ml. <span class='highlight'>Rửa sạch tay và vùng kín</span> bằng nước sạch." },
                    { t: "2. Cách lấy", c: "Bỏ đoạn nước tiểu đầu. <span class='highlight'>Hứng đoạn giữa dòng</span> vào ống nhựa. Đừng để ống chạm vào da." },
                    { t: "3. Hoàn tất", c: "Đóng nắp chặt. Đặt ống lên giá tại phòng xét nghiệm theo chỉ dẫn." }
                ]
            },
            "nuoc-tieu-24h": {
                title: "Nước Tiểu 24H",
                image: "./urine.png", 
                sections: [
                    { t: "1. Bắt đầu (6 giờ sáng)", c: "<span class='highlight'>Tiểu hết bỏ đi</span>, không lấy vào bình." },
                    { t: "2. Thu thập", c: "Mọi lần đi tiểu sau đó (kể cả khi tắm, đi ngoài) <span class='highlight'>phải hứng hết vào bình</span>." },
                    { t: "3. Kết thúc", c: "6 giờ sáng hôm sau tiểu lần cuối vào bình. <span class='highlight'>Lắc đều</span> bình mỗi lần thêm nước tiểu. Để chỗ mát." }
                ]
            },
            "dam": {
                title: "Xét Nghiệm Đàm",
                image: "./sputum.png", 
                sections: [
                    { t: "1. Chuẩn bị", c: "Nên lấy vào <span class='highlight'>sáng sớm khi mới ngủ dậy</span>. Súc miệng bằng nước muối sinh lý." },
                    { t: "2. Cách lấy", c: "Hít sâu, nín thở rồi <span class='highlight'>ho thật mạnh</span> để khạc đờm từ phổi ra lọ. Lấy đủ 2 lọ." },
                    { t: "3. Lưu ý", c: "Không dùng nước súc miệng diệt khuẩn. Mang nộp trong vòng 30 phút." }
                ]
            },
            "phan": {
                title: "Xét Nghiệm Phân",
                image: "./stool.png", 
                sections: [
                    { t: "1. Chuẩn bị", c: "Dùng bô sạch <span class='highlight'>tráng nước sôi để nguội</span>. Không dùng hóa chất tẩy rửa bô." },
                    { t: "2. Cách lấy", c: "Dùng que múc phân cỡ <span class='highlight'>đầu ngón tay út</span>. Lấy chỗ có nhày, máu hoặc lợn cợn trắng." },
                    { t: "3. Nộp mẫu", c: "Đóng nắp kỹ. Mang đến phòng xét nghiệm <span class='highlight'>ngay trong vòng 30 phút</span>." }
                ]
            }
        };

        const nav = document.getElementById('sidebar-nav');
        const content = document.getElementById('main-content');

        function initApp() {
            Object.keys(appData).forEach((key, index) => {
                const item = appData[key];
                const btn = document.createElement('button');
                btn.className = `nav-button ${index === 0 ? 'active' : ''}`;
                btn.innerHTML = `<img src="${item.image}" alt="icon" onerror="this.src='https://via.placeholder.com/55?text=Ảnh+Lỗi'"> <span>${item.title}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showContent(key);
                };
                nav.appendChild(btn);
            });
            showContent(Object.keys(appData)[0]);
        }

        function showContent(key) {
            const data = appData[key];
            
            // Khởi động lại animation mỗi khi đổi tab
            content.style.animation = 'none';
            content.offsetHeight; 
            content.style.animation = null;

            let html = `<h2 style="color:var(--primary-teal); margin-top:0; font-size:2rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px;">${data.title}</h2>`;
            data.sections.forEach(s => {
                html += `
                    <div class="step-card">
                        <div class="step-title">✨ ${s.t}</div>
                        <div class="step-content">${s.c}</div>
                    </div>
                `;
            });
            content.innerHTML = html;
        }

        // Khởi chạy ứng dụng
        initApp();
    </script>
</body>
</html>
