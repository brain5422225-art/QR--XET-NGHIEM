<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hướng Dẫn Lấy Mẫu Xét Nghiệm</title>
    <style>
        :root {
            --primary-teal: #2c7a7b;
            --active-blue: #3182ce;
            --text-main: #2d3748;
            --text-red: #e53e3e;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* DÙNG MÀU NỀN CSS CHUYỂN SẮC THAY VÌ ẢNH NỀN ĐỂ CHỐNG GIẬT LAG */
            background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%);
            display: flex;
            flex-direction: column;
            color: var(--text-main);
        }

        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 3px solid var(--primary-teal);
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            color: var(--primary-teal);
            text-transform: uppercase;
            font-weight: 800;
        }

        .main-wrapper {
            display: flex;
            max-width: 1100px;
            width: 95%;
            margin: 30px auto;
            gap: 25px;
            flex-grow: 1;
        }

        .sidebar {
            flex: 0 0 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-button {
            background: #ffffff;
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s ease-out;
            text-align: left;
            font-size: 1.15rem;
            font-weight: 700;
            color: #4a5568;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .nav-button img {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            object-fit: contain;
            background-color: #f7fafc;
            padding: 5px;
        }

        .nav-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .nav-button.active {
            background: #ebf8ff;
            border-color: var(--active-blue);
            color: var(--active-blue);
        }

        .content-box {
            flex: 1;
            background: #ffffff;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            animation: fadeIn 0.4s ease-out;
        }

        .step-card {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #e2e8f0;
        }

        .step-card:last-child { border: none; margin-bottom: 0; padding-bottom: 0; }

        .step-title {
            font-size: 1.4rem;
            color: var(--primary-teal);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .step-content {
            font-size: 1.2rem;
            line-height: 1.7;
        }

        .highlight {
            color: var(--text-red);
            font-weight: bold;
            background: #fff5f5;
            padding: 3px 8px;
            border-radius: 6px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 800px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { flex: none; width: 100%; flex-direction: row; flex-wrap: wrap; }
            .nav-button { flex: 1 1 45%; padding: 12px; }
            .content-box { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Hướng Dẫn Lấy Mẫu</h1>
    </header>

    <div class="main-wrapper">
        <div class="sidebar" id="sidebar-nav"></div>
        <div class="content-box" id="main-content"></div>
    </div>

    <script>
        // SỬ DỤNG LINK ẢNH TỪ INTERNET ĐỂ TEST
        const appData = {
            "nuoc-tieu": {
                title: "Nước Tiểu Thường",
                image: "https://cdn-icons-png.flaticon.com/512/3209/3209114.png", 
                sections: [
                    { t: "1. Chuẩn bị", c: "Sử dụng ống nhựa trắng 7ml. <span class='highlight'>Rửa sạch tay và vùng kín</span> bằng nước sạch." },
                    { t: "2. Cách lấy", c: "Bỏ đoạn nước tiểu đầu. <span class='highlight'>Hứng đoạn giữa dòng</span> vào ống nhựa. Đừng để ống chạm vào da." },
                    { t: "3. Hoàn tất", c: "Đóng nắp chặt. Đặt ống lên giá tại phòng xét nghiệm theo chỉ dẫn." }
                ]
            },
            "nuoc-tieu-24h": {
                title: "Nước Tiểu 24H",
                image: "https://cdn-icons-png.flaticon.com/512/8192/8192534.png", 
                sections: [
                    { t: "1. Bắt đầu (6 giờ sáng)", c: "<span class='highlight'>Tiểu hết bỏ đi</span>, không lấy vào bình." },
                    { t: "2. Thu thập", c: "Mọi lần đi tiểu sau đó (kể cả khi tắm, đi ngoài) <span class='highlight'>phải hứng hết vào bình</span>." },
                    { t: "3. Kết thúc", c: "6 giờ sáng hôm sau tiểu lần cuối vào bình. <span class='highlight'>Lắc đều</span> bình mỗi lần thêm nước tiểu. Để chỗ mát." }
                ]
            },
            "dam": {
                title: "Xét Nghiệm Đàm",
                image: "https://cdn-icons-png.flaticon.com/512/2854/2854331.png", 
                sections: [
                    { t: "1. Chuẩn bị", c: "Nên lấy vào <span class='highlight'>sáng sớm khi mới ngủ dậy</span>. Súc miệng bằng nước muối sinh lý." },
                    { t: "2. Cách lấy", c: "Hít sâu, nín thở rồi <span class='highlight'>ho thật mạnh</span> để khạc đờm từ phổi ra lọ. Lấy đủ 2 lọ." },
                    { t: "3. Lưu ý", c: "Không dùng nước súc miệng diệt khuẩn. Mang nộp trong vòng 30 phút." }
                ]
            },
            "phan": {
                title: "Xét Nghiệm Phân",
                image: "https://cdn-icons-png.flaticon.com/512/10008/10008770.png", 
                sections: [
                    { t: "1. Chuẩn bị", c: "Dùng bô sạch <span class='highlight'>tráng nước sôi để nguội</span>. Không dùng hóa chất tẩy rửa bô." },
                    { t: "2. Cách lấy", c: "Dùng que múc phân cỡ <span class='highlight'>đầu ngón tay út</span>. Lấy chỗ có nhày, máu hoặc lợn cợn trắng." },
                    { t: "3. Nộp mẫu", c: "Đóng nắp kỹ. Mang đến phòng xét nghiệm <span class='highlight'>ngay trong vòng 30 phút</span>." }
                ]
            }
        };

        const nav = document.getElementById('sidebar-nav');
        const content = document.getElementById('main-content');

        function initApp() {
            Object.keys(appData).forEach((key, index) => {
                const item = appData[key];
                const btn = document.createElement('button');
                btn.className = `nav-button ${index === 0 ? 'active' : ''}`;
                btn.innerHTML = `<img src="${item.image}" alt="icon"> <span>${item.title}</span>`;
                
                btn.onclick = () => {
                    document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showContent(key);
                };
                nav.appendChild(btn);
            });
            showContent(Object.keys(appData)[0]);
        }

        function showContent(key) {
            const data = appData[key];
            
            content.style.animation = 'none';
            content.offsetHeight; 
            content.style.animation = null;

            let html = `<h2 style="color:var(--primary-teal); margin-top:0; font-size:1.8rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 20px;">${data.title}</h2>`;
            data.sections.forEach(s => {
                html += `
                    <div class="step-card">
                        <div class="step-title">✨ ${s.t}</div>
                        <div class="step-content">${s.c}</div>
                    </div>
                `;
            });
            content.innerHTML = html;
        }

        initApp();
    </script>
</body>
</html>
